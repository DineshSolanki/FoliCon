name: Generate Release Notes

on:
  release:
    types: [published]

jobs:
  generate-notes:
    permissions:
      models: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release body
        id: release
        run: |
          # The release body is available from the event payload
          BODY=$(jq -r '.release.body' "$GITHUB_EVENT_PATH")
          # Write to file to avoid shell escaping issues
          echo "$BODY" > /tmp/release-body.txt
          echo "version=$(jq -r '.release.tag_name' "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"

      - name: Generate formatted release notes
        id: ai
        uses: actions/ai-inference@v1
        with:
          prompt-file: './.github/prompts/release-notes.prompt.yml'
          file_input: |
            release_body: /tmp/release-body.txt
          input: |
            version: ${{ steps.release.outputs.version }}
            repo: ${{ github.repository }}
          model: openai/gpt-4o
          temperature: 0.3

      - name: Update release title and body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const responseFile = '${{ steps.ai.outputs.response-file }}';
            const raw = fs.readFileSync(responseFile, 'utf8');

            // Parse: first line is "TITLE: ...", then blank line, then body
            const firstNewline = raw.indexOf('\n');
            const titleLine = raw.substring(0, firstNewline).trim();
            const title = titleLine.replace(/^TITLE:\s*/, '');
            const body = raw.substring(firstNewline + 1).trim();

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              name: title,
              body: body
            });
