name: Regenerate Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v5.0.0)'
        required: true
        type: string

jobs:
  generate-notes:
    permissions:
      models: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release body
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.body')
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          # Build the prompt file dynamically to avoid YAML parsing issues
          # Copy the template, then append version and body as plain text
          cp ./.github/prompts/release-notes.prompt.yml /tmp/prompt.yml
          echo "Version: ${TAG}" >> /tmp/prompt.yml
          echo "Repository: ${{ github.repository }}" >> /tmp/prompt.yml
          echo "" >> /tmp/prompt.yml
          echo '```' >> /tmp/prompt.yml
          echo "$BODY" >> /tmp/prompt.yml
          echo '```' >> /tmp/prompt.yml

      - name: Generate formatted release notes
        id: ai
        uses: actions/ai-inference@v1
        with:
          prompt-file: '/tmp/prompt.yml'
          model: openai/gpt-4o

      - name: Update release title and body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const responseFile = '${{ steps.ai.outputs.response-file }}';
            const raw = fs.readFileSync(responseFile, 'utf8');

            // Parse: first line is "TITLE: ...", then blank line, then body
            const firstNewline = raw.indexOf('\n');
            const titleLine = raw.substring(0, firstNewline).trim();
            const title = titleLine.replace(/^TITLE:\s*/, '');
            const body = raw.substring(firstNewline + 1).trim();

            // Fetch release ID by tag
            const tag = '${{ inputs.tag }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: title,
              body: body
            });
