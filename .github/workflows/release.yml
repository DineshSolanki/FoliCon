name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as a pre-release (beta)'
        required: false
        type: boolean
        default: false

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      is_prerelease: ${{ steps.flags.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: set-version-tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Bump minor version
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        id: set-version-dispatch
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content FoliCon/FoliCon.csproj
          $current = $csproj.Project.PropertyGroup.Version
          $parts = $current.Split('.')
          $newVersion = "$($parts[0]).$([int]$parts[1] + 1).0"
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Export version
        id: set-version
        run: |
          VERSION="${{ steps.set-version-tag.outputs.version || steps.set-version-dispatch.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set flags
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish FoliCon
    needs: version
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $csproj = Get-Content FoliCon/FoliCon.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$version</Version>"
          $csproj = $csproj -replace '<PackageVersion>.*?</PackageVersion>', "<PackageVersion>$version</PackageVersion>"
          $csproj = $csproj -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version</AssemblyVersion>"
          Set-Content FoliCon/FoliCon.csproj $csproj

      - name: Publish
        run: >
          dotnet publish FoliCon/FoliCon.csproj
          -p:PublishProfile="64 dependent"
          --configuration Release

      - name: Zip output
        shell: pwsh
        run: |
          $publishDir = "FoliCon/bin/Release/net9.0-windows/publish/64Dependant"
          $suffix = if ("${{ needs.version.outputs.is_prerelease }}" -eq "true") { "-beta" } else { "" }
          Compress-Archive -Path "$publishDir/*" -DestinationPath "FoliCon-v${{ needs.version.outputs.version }}${suffix}-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoliCon-v${{ needs.version.outputs.version }}-x64
          path: FoliCon-v${{ needs.version.outputs.version }}*-x64.zip
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.version.outputs.version) }}
          name: "FoliCon v${{ needs.version.outputs.version }}${{ needs.version.outputs.is_prerelease == 'true' && ' (Pre-release)' || '' }}"
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*.zip

  release-notes:
    name: Generate AI release notes
    needs: [version, release]
    if: needs.version.outputs.is_prerelease == 'false'
    permissions:
      models: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release body
        id: get-body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.body')
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          # Build the prompt file dynamically to avoid YAML parsing issues
          cp ./.github/prompts/release-notes.prompt.yml /tmp/prompt.yml
          echo "Version: ${TAG}" >> /tmp/prompt.yml
          echo "Repository: ${{ github.repository }}" >> /tmp/prompt.yml
          echo "" >> /tmp/prompt.yml
          echo '```' >> /tmp/prompt.yml
          echo "$BODY" >> /tmp/prompt.yml
          echo '```' >> /tmp/prompt.yml

      - name: Generate formatted release notes
        id: ai
        uses: actions/ai-inference@v1
        with:
          prompt-file: '/tmp/prompt.yml'
          model: openai/gpt-4o

      - name: Update release title and body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const responseFile = '${{ steps.ai.outputs.response-file }}';
            const raw = fs.readFileSync(responseFile, 'utf8');

            // Parse: first line is "TITLE: ...", then blank line, then body
            const firstNewline = raw.indexOf('\n');
            const titleLine = raw.substring(0, firstNewline).trim();
            const title = titleLine.replace(/^TITLE:\s*/, '');
            const body = raw.substring(firstNewline + 1).trim();

            // Fetch release ID by tag
            const tag = 'v${{ needs.version.outputs.version }}';
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: title,
              body: body
            });

  bump-version:
    name: Commit version bump
    needs: [version, release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bump version in csproj
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $csproj = Get-Content FoliCon/FoliCon.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$version</Version>"
          $csproj = $csproj -replace '<PackageVersion>.*?</PackageVersion>', "<PackageVersion>$version</PackageVersion>"
          $csproj = $csproj -replace '<AssemblyVersion>.*?</AssemblyVersion>', "<AssemblyVersion>$version</AssemblyVersion>"
          Set-Content FoliCon/FoliCon.csproj $csproj

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FoliCon/FoliCon.csproj
          git diff --cached --quiet && echo "No version changes to commit" && exit 0
          git commit -m "chore: bump version to v${{ needs.version.outputs.version }}"
          git push
